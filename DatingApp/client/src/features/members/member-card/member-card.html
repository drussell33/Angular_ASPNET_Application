@if (member(); as member) {
<div routerLink="/members/{{member.id}}" class="card relative overflow-hidden cursor-pointer transition-all duration-300 ease-in-out 
        transform hover:-translate-y-2">
    <img src="{{member?.imageUrl || '/user.png'}}" alt="{{member.displayName}} image"
        class="w-full h-full object-cover rounded-lg">
    <div class="absolute bottom-0 w-full px-3 py-2
               bg-linear-to-t from-black via-black/75 to-black/0
               rounded-b-lg">
        <div class="flex flex-col text-white">
            <span class="font-semibold">{{member.displayName}}, {{member.dateOfBirth | age}}</span>
            <span class="text-sm">{{member.city}}</span>
        </div>
    </div>
</div>
}
